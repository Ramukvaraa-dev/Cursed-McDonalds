name: Bug report
description: Report something that isn’t working
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect to happen?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Go to...
        2. Click...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste logs (if any) or attach screenshots.
      render: shell
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: OS
      description: Windows/macOS/Linux + version
      placeholder: "Windows 11 23H2"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version (if running from source)
      placeholder: "3.11.8"
    validations:
      required: false

