name: Build (Windows + macOS)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify build spec exists
        shell: bash
        run: |
          ls -la
          test -f "Cursed McDonalds.spec"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller (spec)
        continue-on-error: true
        run: |
          pyinstaller "Cursed McDonalds.spec" --noconfirm --clean

      - name: Show dist output
        run: |
          ls -la
          ls -la dist || true
          find dist -maxdepth 3 -name "*.app" -print || true
          find . -maxdepth 2 -type d -name "build" -print || true

      - name: Derive version
        id: version
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME:-0.0.0}"
          ver="${ref#v}"
          echo "version=${ver}" >> "${GITHUB_OUTPUT}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zip = "Cursed-McDonalds-windows.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "dist/Cursed McDonalds/*" -DestinationPath $zip

      - name: Build Windows installer (.exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup -y
          iscc "installer/windows/CursedMcDonalds.iss" /DMyAppVersion="${{ steps.version.outputs.version }}"
          if (!(Test-Path "dist_installer/Cursed-McDonalds-Setup-windows.exe")) {
            Write-Error "Missing dist_installer/Cursed-McDonalds-Setup-windows.exe"
          }

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          zip="Cursed-McDonalds-macOS.zip"
          rm -f "$zip"
          app_path="$(find dist -maxdepth 3 -name 'Cursed McDonalds.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "ERROR: Could not find 'Cursed McDonalds.app' under dist/"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$zip"

      - name: Build macOS installer (.dmg)
        if: runner.os == 'macOS'
        run: |
          ./scripts/build_macos_dmg.sh "Cursed-McDonalds-macOS.dmg"

      - name: Fail if packages missing
        shell: bash
        run: |
          if [ "${RUNNER_OS}" = "macOS" ]; then
            test -f "Cursed-McDonalds-macOS.zip"
            test -f "Cursed-McDonalds-macOS.dmg"
          fi
          if [ "${RUNNER_OS}" = "Windows" ]; then
            test -f "Cursed-McDonalds-windows.zip"
            test -f "dist_installer/Cursed-McDonalds-Setup-windows.exe"
          fi

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: Cursed-McDonalds-windows
          path: Cursed-McDonalds-windows.zip

      - name: Upload installer (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: Cursed-McDonalds-installer-windows
          path: dist_installer/Cursed-McDonalds-Setup-windows.exe

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: Cursed-McDonalds-macOS
          path: Cursed-McDonalds-macOS.zip

      - name: Upload installer (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: Cursed-McDonalds-installer-macOS
          path: Cursed-McDonalds-macOS.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release + upload zips
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/Cursed-McDonalds-*.zip
            artifacts/**/Cursed-McDonalds-Setup-windows.exe
            artifacts/**/Cursed-McDonalds-macOS.dmg
