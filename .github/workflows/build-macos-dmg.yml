name: Build macOS DMG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: python3 -m pip install -r requirements-build.txt

      - name: Build app
        run: bash packaging/macos/build.sh

      - name: Create dmg
        run: bash packaging/macos/make-dmg.sh

      - name: Zip app (artifact)
        run: ditto -c -k --sequesterRsrc --keepParent "dist/Cursed McDonalds.app" "dist/Cursed McDonalds.app.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cursed-McDonalds-macOS
          path: |
            dist/Cursed McDonalds.dmg
            dist/Cursed McDonalds.app.zip

