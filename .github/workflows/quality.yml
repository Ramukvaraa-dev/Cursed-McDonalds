name: Quality

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  compile:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile all Python files
        run: python -m compileall .
      - name: Ruff (fast static checks)
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          # Minimal "enterprise-safe" set: catches obvious runtime-breakers without enforcing style.
          ruff check --select E9,F63,F7,F82 .
