name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: python -m pip install -r requirements-build.txt

      - name: Build one-file exe
        run: powershell -ExecutionPolicy Bypass -File packaging/windows/build-onefile.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cursed-McDonalds-Windows-EXE
          path: "dist/Cursed McDonalds.exe"

